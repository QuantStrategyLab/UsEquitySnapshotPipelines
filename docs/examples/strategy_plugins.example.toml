output_dir = "data/output/strategy_plugins"
default_mode = "shadow"

[[strategy_plugins]]
strategy = "tqqq_growth_income"
plugin = "crisis_response_shadow"
enabled = true
# The runner enforces plugin/strategy compatibility. This plugin is scoped to
# the TQQQ black-swan defense strategy.
# mode is optional when it matches default_mode.
# Set mode = "paper", "advisory", or "live" here to override this plugin only.

[strategy_plugins.inputs]
prices = "data/output/crisis_response_shadow/input/price_history.csv"
external_context = "data/output/crisis_response_shadow/input/external_context.csv"
event_set = "full"
financial_symbols = ["XLF", "KRE"]
credit_pairs = ["HYG:IEF", "LQD:IEF"]
rate_symbols = ["IEF", "TLT"]

[strategy_plugins.outputs]
output_dir = "data/output/tqqq_growth_income/plugins/crisis_response_shadow"

[[strategy_plugins]]
strategy = "dynamic_mega_leveraged_pullback"
plugin = "taco_rebound_shadow"
enabled = true
# TACO is a separate left-side rebound budget signal. It is not part of the
# crisis_response_shadow plugin.
# It is scoped to dynamic/MAGS-style left-side pullback strategies.

[strategy_plugins.inputs]
prices = "data/output/taco_rebound_shadow/input/price_history.csv"
event_set = "geopolitical-deescalation"
benchmark_symbol = "QQQ"
attack_symbol = "TQQQ"
active_signal_days = 10
geopolitical_deescalation_sleeve = 0.10
tariff_softening_sleeve = 0.05
max_sleeve = 0.10

[strategy_plugins.outputs]
output_dir = "data/output/dynamic_mega_leveraged_pullback/plugins/taco_rebound_shadow"
