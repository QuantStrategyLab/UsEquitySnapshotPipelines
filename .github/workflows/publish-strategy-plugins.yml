name: Publish Strategy Plugins

on:
  schedule:
    # Weekdays after the regular US close. The plugin itself enforces freshness.
    - cron: '30 22 * * 1-5'
  workflow_dispatch:
    inputs:
      execute_publish:
        description: Actually upload plugin artifacts to GCS. false only builds and uploads a GitHub artifact.
        required: true
        default: false
        type: boolean
      price_start:
        description: Earliest yfinance price download date.
        required: false
        default: '2010-01-01'
        type: string
      price_end:
        description: Optional yfinance price download end date.
        required: false
        type: string
      gcs_prefix:
        description: Optional legacy TQQQ GCS prefix override.
        required: false
        type: string
      taco_gcs_prefix:
        description: Optional TQQQ TACO rebound GCS prefix override.
        required: false
        type: string
      market_regime_gcs_prefix:
        description: Optional TQQQ market regime control GCS prefix override.
        required: false
        type: string
      market_regime_soxl_gcs_prefix:
        description: Optional SOXL market regime notification GCS prefix override.
        required: false
        type: string
      market_regime_soxl_strategy_gcs_prefix:
        description: Optional SOXL market regime strategy GCS prefix override.
        required: false
        type: string
      ibit_zscore_gcs_prefix:
        description: Optional IBIT Z-Score exit GCS prefix override.
        required: false
        type: string
      ibit_zscore_metrics_url:
        description: Optional CSV/JSON endpoint for IBIT MVRV Z-Score history.
        required: false
        type: string
      ibit_zscore_metrics_urls:
        description: Optional comma/newline-separated CSV/JSON endpoints for IBIT MVRV Z-Score history.
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  market-regime-control:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - strategy_profile: tqqq_growth_income
            target_type: strategy
            notification_target: ''
            output_scope: tqqq_growth_income
            benchmark_symbol: QQQ
            attack_symbol: TQQQ
            event_set: full-plus-geopolitical-deescalation
            start_date: '2018-01-01'
            taco_enabled: 'true'
            volatility_delever_price_rebound_enabled: 'false'
          - strategy_profile: soxl_soxx_trend_income
            target_type: notification_target
            notification_target: market_regime_notification
            output_scope: market_regime_notification
            benchmark_symbol: SOXX
            attack_symbol: SOXL
            event_set: full
            start_date: '2010-01-01'
            taco_enabled: 'false'
            volatility_delever_price_rebound_enabled: 'false'
          - strategy_profile: soxl_soxx_trend_income
            target_type: strategy
            notification_target: ''
            output_scope: soxl_soxx_trend_income
            benchmark_symbol: SOXX
            attack_symbol: SOXL
            event_set: full
            start_date: '2010-01-01'
            taco_enabled: 'false'
            volatility_delever_price_rebound_enabled: 'true'
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'interactivebrokersquant' }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT: ${{ vars.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}
      EXECUTE_PUBLISH: ${{ github.event_name == 'schedule' && 'true' || inputs.execute_publish }}
      PRICE_START: ${{ inputs.price_start || '2010-01-01' }}
      PRICE_END: ${{ inputs.price_end }}
      INPUT_MARKET_REGIME_GCS_PREFIX: ${{ inputs.market_regime_gcs_prefix }}
      INPUT_MARKET_REGIME_SOXL_GCS_PREFIX: ${{ inputs.market_regime_soxl_gcs_prefix }}
      INPUT_MARKET_REGIME_SOXL_STRATEGY_GCS_PREFIX: ${{ inputs.market_regime_soxl_strategy_gcs_prefix }}
      MARKET_REGIME_TQQQ_GCS_PREFIX: ${{ vars.MARKET_REGIME_CONTROL_GCS_PREFIX || 'gs://qsl-runtime-logs-shared/strategy-artifacts/us_equity/tqqq_growth_income/plugins/market_regime_control' }}
      MARKET_REGIME_SOXL_GCS_PREFIX: ${{ vars.MARKET_REGIME_CONTROL_SOXL_GCS_PREFIX || 'gs://qsl-runtime-logs-shared/strategy-artifacts/us_equity/market_regime_notification/plugins/market_regime_control' }}
      MARKET_REGIME_SOXL_STRATEGY_GCS_PREFIX: ${{ vars.MARKET_REGIME_CONTROL_SOXL_STRATEGY_GCS_PREFIX || 'gs://qsl-runtime-logs-shared/strategy-artifacts/us_equity/soxl_soxx_trend_income/plugins/market_regime_control' }}
      YFINANCE_PROXY: ${{ secrets.YFINANCE_PROXY }}
      STRATEGY_PROFILE: ${{ matrix.strategy_profile }}
      PLUGIN_TARGET_TYPE: ${{ matrix.target_type }}
      PLUGIN_NOTIFICATION_TARGET: ${{ matrix.notification_target }}
      PLUGIN_NAME: market_regime_control
      PLUGIN_BENCHMARK_SYMBOL: ${{ matrix.benchmark_symbol }}
      PLUGIN_ATTACK_SYMBOL: ${{ matrix.attack_symbol }}
      PLUGIN_EVENT_SET: ${{ matrix.event_set }}
      PLUGIN_START_DATE: ${{ matrix.start_date }}
      PLUGIN_TACO_ENABLED: ${{ matrix.taco_enabled }}
      PLUGIN_VOLATILITY_DELEVER_PRICE_REBOUND_ENABLED: ${{ matrix.volatility_delever_price_rebound_enabled }}
      PRICE_INPUT_DIR: data/input/strategy_plugins/${{ matrix.strategy_profile }}/market_regime_control
      PLUGIN_OUTPUT_DIR: data/output/${{ matrix.output_scope }}/plugins/market_regime_control
      RUNNER_OUTPUT_DIR: data/output/strategy_plugins

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Resolve publish target
        run: |
          set -euo pipefail
          if [ "${STRATEGY_PROFILE}" = "soxl_soxx_trend_income" ] && [ "${PLUGIN_TARGET_TYPE}" = "strategy" ]; then
            gcs_prefix="${INPUT_MARKET_REGIME_SOXL_STRATEGY_GCS_PREFIX:-${MARKET_REGIME_SOXL_STRATEGY_GCS_PREFIX}}"
          elif [ "${STRATEGY_PROFILE}" = "soxl_soxx_trend_income" ]; then
            gcs_prefix="${INPUT_MARKET_REGIME_SOXL_GCS_PREFIX:-${MARKET_REGIME_SOXL_GCS_PREFIX}}"
          else
            gcs_prefix="${INPUT_MARKET_REGIME_GCS_PREFIX:-${MARKET_REGIME_TQQQ_GCS_PREFIX}}"
          fi
          echo "GCS_PREFIX=${gcs_prefix}" >> "$GITHUB_ENV"
          echo "Resolved ${STRATEGY_PROFILE} ${PLUGIN_NAME} publish prefix: ${gcs_prefix}"

      - name: Check whether Google Cloud auth is needed
        id: market-regime-gcp-auth-check
        run: |
          set -euo pipefail
          needed=false
          if [ "${EXECUTE_PUBLISH}" = "true" ] && [ -n "${GCS_PREFIX:-}" ]; then
            needed=true
          fi
          echo "needed=${needed}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        if: steps.market-regime-gcp-auth-check.outputs.needed == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: steps.market-regime-gcp-auth-check.outputs.needed == 'true'
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: '>= 416.0.0'

      - name: Download plugin price inputs
        run: |
          set -euo pipefail
          mkdir -p "${PRICE_INPUT_DIR}"
          python - <<'PY'
          import os
          from pathlib import Path

          from us_equity_snapshot_pipelines.yfinance_prices import download_price_history

          symbols = [
              os.environ["PLUGIN_BENCHMARK_SYMBOL"],
              os.environ["PLUGIN_ATTACK_SYMBOL"],
              "SPY",
              "^VIX",
              "HYG",
              "IEF",
              "LQD",
              "XLF",
              "KRE",
              "TLT",
          ]
          symbols = list(dict.fromkeys(str(symbol).strip().upper() for symbol in symbols if str(symbol).strip()))
          output_path = Path(os.environ["PRICE_INPUT_DIR"]) / "market_regime_control_price_history.csv"
          prices = download_price_history(
              symbols,
              start=os.environ.get("PRICE_START") or "2010-01-01",
              end=os.environ.get("PRICE_END") or None,
              proxy=os.environ.get("YFINANCE_PROXY") or None,
          )
          prices.to_csv(output_path, index=False)
          print(f"downloaded {len(prices)} price rows -> {output_path}")
          PY

      - name: Build strategy plugin artifact
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_OUTPUT_DIR}" "${PLUGIN_OUTPUT_DIR}"
          config_path="${RUNNER_TEMP:-/tmp}/strategy_plugins.toml"
          prices_path="${PRICE_INPUT_DIR}/market_regime_control_price_history.csv"
          if [ "${PLUGIN_TARGET_TYPE}" = "notification_target" ]; then
            cat > "${config_path}" <<EOF
          output_dir = "${RUNNER_OUTPUT_DIR}"
          default_mode = "shadow"

          [[notification_targets]]
          notification_target = "${PLUGIN_NOTIFICATION_TARGET}"
          plugin = "${PLUGIN_NAME}"
          enabled = true

          [notification_targets.inputs]
          prices = "${prices_path}"
          event_set = "${PLUGIN_EVENT_SET}"
          start_date = "${PLUGIN_START_DATE}"
          benchmark_symbol = "${PLUGIN_BENCHMARK_SYMBOL}"
          attack_symbol = "${PLUGIN_ATTACK_SYMBOL}"
          vix_symbols = ["VIX", "^VIX", "VIXCLS"]
          credit_pairs = ["HYG:IEF", "LQD:IEF"]
          financial_symbols = ["XLF", "KRE"]
          rate_symbols = ["IEF", "TLT"]
          strategy_policy = "levered_growth_income_v1"
          realized_vol_threshold = 0.30
          realized_vol_requires_confirmation = true
          delever_risk_asset_scalar = 0.0
          taco_opportunity_size_scalar = 0.0
          crisis_enabled = true
          macro_enabled = true
          taco_enabled = ${PLUGIN_TACO_ENABLED}
          volatility_delever_price_rebound_enabled = ${PLUGIN_VOLATILITY_DELEVER_PRICE_REBOUND_ENABLED}

          [notification_targets.outputs]
          output_dir = "${PLUGIN_OUTPUT_DIR}"
          EOF
            selector_args=(--notification-targets "${PLUGIN_NOTIFICATION_TARGET}")
          else
            cat > "${config_path}" <<EOF
          output_dir = "${RUNNER_OUTPUT_DIR}"
          default_mode = "shadow"

          [[strategy_plugins]]
          strategy = "${STRATEGY_PROFILE}"
          plugin = "${PLUGIN_NAME}"
          enabled = true

          [strategy_plugins.inputs]
          prices = "${prices_path}"
          event_set = "${PLUGIN_EVENT_SET}"
          start_date = "${PLUGIN_START_DATE}"
          benchmark_symbol = "${PLUGIN_BENCHMARK_SYMBOL}"
          attack_symbol = "${PLUGIN_ATTACK_SYMBOL}"
          vix_symbols = ["VIX", "^VIX", "VIXCLS"]
          credit_pairs = ["HYG:IEF", "LQD:IEF"]
          financial_symbols = ["XLF", "KRE"]
          rate_symbols = ["IEF", "TLT"]
          strategy_policy = "levered_growth_income_v1"
          realized_vol_threshold = 0.30
          realized_vol_requires_confirmation = true
          delever_risk_asset_scalar = 0.0
          taco_opportunity_size_scalar = 0.0
          crisis_enabled = true
          macro_enabled = true
          taco_enabled = ${PLUGIN_TACO_ENABLED}
          volatility_delever_price_rebound_enabled = ${PLUGIN_VOLATILITY_DELEVER_PRICE_REBOUND_ENABLED}

          [strategy_plugins.outputs]
          output_dir = "${PLUGIN_OUTPUT_DIR}"
          EOF
            selector_args=(--strategies "${STRATEGY_PROFILE}")
          fi
          python scripts/run_strategy_plugins.py --config "${config_path}" --plugins "${PLUGIN_NAME}" "${selector_args[@]}"
          test -f "${PLUGIN_OUTPUT_DIR}/latest_signal.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads((Path(os.environ["PLUGIN_OUTPUT_DIR"]) / "latest_signal.json").read_text(encoding="utf-8"))
          target_type = os.environ["PLUGIN_TARGET_TYPE"]
          if target_type == "notification_target":
              if payload.get("target_type") != "notification_target":
                  raise SystemExit(f"unexpected target_type: {payload.get('target_type')!r}")
              if payload.get("notification_target") != os.environ["PLUGIN_NOTIFICATION_TARGET"]:
                  raise SystemExit(f"unexpected notification_target: {payload.get('notification_target')!r}")
          else:
              if payload.get("strategy") != os.environ["STRATEGY_PROFILE"]:
                  raise SystemExit(f"unexpected strategy: {payload.get('strategy')!r}")
          if payload.get("plugin") != os.environ["PLUGIN_NAME"]:
              raise SystemExit(f"unexpected plugin: {payload.get('plugin')!r}")
          if payload.get("schema_version") != "market_regime_control.v1":
              raise SystemExit(f"unexpected schema_version: {payload.get('schema_version')!r}")
          if payload.get("effective_mode") != "shadow":
              raise SystemExit(f"unexpected effective_mode: {payload.get('effective_mode')!r}")
          controls = payload.get("execution_controls") or {}
          if controls.get("broker_order_allowed") or controls.get("live_allocation_mutation_allowed"):
              raise SystemExit("market regime artifact must not allow broker/allocation mutation")
          if target_type == "notification_target":
              if controls.get("strategy_runtime_metadata_allowed") is not False:
                  raise SystemExit("notification target artifact must not be mountable as strategy metadata")
              if controls.get("position_control_allowed") is not False:
                  raise SystemExit("notification target artifact must not allow position control")
          else:
              if controls.get("strategy_runtime_metadata_allowed") is not True:
                  raise SystemExit("market regime artifact must be mountable as strategy metadata")
              if not isinstance(payload.get("position_control"), dict):
                  raise SystemExit("market regime artifact must include position_control")
          if not isinstance(payload.get("notification"), dict):
              raise SystemExit("market regime artifact must include notification")
          print(
              "validated latest_signal "
              f"as_of={payload.get('as_of')} route={payload.get('canonical_route')} "
              f"action={payload.get('suggested_action')}"
          )
          PY
          python - <<'PY'
          import os
          from pathlib import Path

          from us_equity_snapshot_pipelines.artifacts import write_strategy_plugin_release_manifest

          manifest = write_strategy_plugin_release_manifest(
              output_dir=Path(os.environ["PLUGIN_OUTPUT_DIR"]),
              repository=os.environ.get("GITHUB_REPOSITORY"),
              git_sha=os.environ.get("GITHUB_SHA"),
              run_id=os.environ.get("GITHUB_RUN_ID"),
              run_attempt=os.environ.get("GITHUB_RUN_ATTEMPT"),
          )
          print(f"wrote strategy plugin release manifest -> {manifest}")
          PY
          test -f "${PLUGIN_OUTPUT_DIR}/release_manifest.json"
          test -d "${PLUGIN_OUTPUT_DIR}/releases"

      - name: Publish or print GCS plan
        run: |
          set -euo pipefail
          if [ -z "${GCS_PREFIX:-}" ]; then
            echo "GCS_PREFIX is not set; skipping GCS publish."
            exit 0
          fi

          if [ "${EXECUTE_PUBLISH}" = "true" ]; then
            python - <<'PY'
          import os

          from us_equity_snapshot_pipelines.artifacts import normalize_strategy_plugin_gcs_prefix

          prefix = normalize_strategy_plugin_gcs_prefix(os.environ["GCS_PREFIX"])
          print(f"Validated strategy plugin GCS prefix: {prefix}")
          PY
          fi

          normalized_prefix="${GCS_PREFIX%/}"
          while IFS= read -r -d '' source_path; do
            relative_path="${source_path#${PLUGIN_OUTPUT_DIR}/}"
            destination="${normalized_prefix}/${relative_path}"
            if [ "${EXECUTE_PUBLISH}" = "true" ]; then
              gcloud storage cp "${source_path}" "${destination}"
            else
              echo "DRY-RUN gcloud storage cp ${source_path} ${destination}"
            fi
          done < <(find "${PLUGIN_OUTPUT_DIR}" -type f -print0 | sort -z)

      - name: Publish unified notification-target alert
        if: env.PLUGIN_TARGET_TYPE == 'notification_target' && env.EXECUTE_PUBLISH == 'true'
        env:
          STRATEGY_PLUGIN_ALERT_CHANNELS: ${{ vars.STRATEGY_PLUGIN_ALERT_CHANNELS || 'telegram' }}
          STRATEGY_PLUGIN_ALERT_LANG: ${{ vars.STRATEGY_PLUGIN_ALERT_LANG || 'zh' }}
          STRATEGY_PLUGIN_ALERT_STATE_GCS_URI: ${{ vars.STRATEGY_PLUGIN_ALERT_STATE_GCS_URI || 'gs://qsl-runtime-logs-shared/strategy-plugin-alert-state/market_regime_control' }}
          STRATEGY_PLUGIN_ALERT_EMAIL_RECIPIENTS: ${{ vars.STRATEGY_PLUGIN_ALERT_EMAIL_RECIPIENTS }}
          STRATEGY_PLUGIN_ALERT_EMAIL_SENDER_EMAIL: ${{ vars.STRATEGY_PLUGIN_ALERT_EMAIL_SENDER_EMAIL }}
          STRATEGY_PLUGIN_ALERT_EMAIL_SMTP_HOST: ${{ vars.STRATEGY_PLUGIN_ALERT_EMAIL_SMTP_HOST }}
          STRATEGY_PLUGIN_ALERT_EMAIL_SMTP_PORT: ${{ vars.STRATEGY_PLUGIN_ALERT_EMAIL_SMTP_PORT }}
          STRATEGY_PLUGIN_ALERT_EMAIL_SMTP_SECURITY: ${{ vars.STRATEGY_PLUGIN_ALERT_EMAIL_SMTP_SECURITY }}
          STRATEGY_PLUGIN_ALERT_EMAIL_SENDER_PASSWORD: ${{ secrets.STRATEGY_PLUGIN_ALERT_EMAIL_SENDER_PASSWORD }}
          STRATEGY_PLUGIN_ALERT_SMS_RECIPIENTS: ${{ vars.STRATEGY_PLUGIN_ALERT_SMS_RECIPIENTS }}
          STRATEGY_PLUGIN_ALERT_SMS_PROVIDER: ${{ vars.STRATEGY_PLUGIN_ALERT_SMS_PROVIDER }}
          STRATEGY_PLUGIN_ALERT_SMS_ACCOUNT_ID: ${{ vars.STRATEGY_PLUGIN_ALERT_SMS_ACCOUNT_ID }}
          STRATEGY_PLUGIN_ALERT_SMS_SENDER: ${{ vars.STRATEGY_PLUGIN_ALERT_SMS_SENDER }}
          STRATEGY_PLUGIN_ALERT_SMS_MESSAGING_SERVICE_ID: ${{ vars.STRATEGY_PLUGIN_ALERT_SMS_MESSAGING_SERVICE_ID }}
          STRATEGY_PLUGIN_ALERT_SMS_API_BASE_URL: ${{ vars.STRATEGY_PLUGIN_ALERT_SMS_API_BASE_URL }}
          STRATEGY_PLUGIN_ALERT_SMS_BODY_MAX_CHARS: ${{ vars.STRATEGY_PLUGIN_ALERT_SMS_BODY_MAX_CHARS }}
          STRATEGY_PLUGIN_ALERT_SMS_AUTH_TOKEN: ${{ secrets.STRATEGY_PLUGIN_ALERT_SMS_AUTH_TOKEN }}
          STRATEGY_PLUGIN_ALERT_PUSH_RECIPIENTS: ${{ vars.STRATEGY_PLUGIN_ALERT_PUSH_RECIPIENTS }}
          STRATEGY_PLUGIN_ALERT_PUSH_PROVIDER: ${{ vars.STRATEGY_PLUGIN_ALERT_PUSH_PROVIDER }}
          STRATEGY_PLUGIN_ALERT_PUSH_API_BASE_URL: ${{ vars.STRATEGY_PLUGIN_ALERT_PUSH_API_BASE_URL }}
          STRATEGY_PLUGIN_ALERT_PUSH_DEVICE: ${{ vars.STRATEGY_PLUGIN_ALERT_PUSH_DEVICE }}
          STRATEGY_PLUGIN_ALERT_PUSH_PRIORITY: ${{ vars.STRATEGY_PLUGIN_ALERT_PUSH_PRIORITY }}
          STRATEGY_PLUGIN_ALERT_PUSH_TAGS: ${{ vars.STRATEGY_PLUGIN_ALERT_PUSH_TAGS }}
          STRATEGY_PLUGIN_ALERT_PUSH_BODY_MAX_CHARS: ${{ vars.STRATEGY_PLUGIN_ALERT_PUSH_BODY_MAX_CHARS }}
          STRATEGY_PLUGIN_ALERT_PUSH_APP_TOKEN: ${{ secrets.STRATEGY_PLUGIN_ALERT_PUSH_APP_TOKEN }}
          STRATEGY_PLUGIN_ALERT_PUSH_ACCESS_TOKEN: ${{ secrets.STRATEGY_PLUGIN_ALERT_PUSH_ACCESS_TOKEN }}
          STRATEGY_PLUGIN_ALERT_TELEGRAM_CHAT_IDS: ${{ vars.STRATEGY_PLUGIN_ALERT_TELEGRAM_CHAT_IDS }}
          STRATEGY_PLUGIN_ALERT_TELEGRAM_API_BASE_URL: ${{ vars.STRATEGY_PLUGIN_ALERT_TELEGRAM_API_BASE_URL }}
          STRATEGY_PLUGIN_ALERT_TELEGRAM_PARSE_MODE: ${{ vars.STRATEGY_PLUGIN_ALERT_TELEGRAM_PARSE_MODE }}
          STRATEGY_PLUGIN_ALERT_TELEGRAM_DISABLE_WEB_PAGE_PREVIEW: ${{ vars.STRATEGY_PLUGIN_ALERT_TELEGRAM_DISABLE_WEB_PAGE_PREVIEW }}
          STRATEGY_PLUGIN_ALERT_TELEGRAM_BODY_MAX_CHARS: ${{ vars.STRATEGY_PLUGIN_ALERT_TELEGRAM_BODY_MAX_CHARS }}
          STRATEGY_PLUGIN_ALERT_TELEGRAM_BOT_TOKEN: ${{ secrets.STRATEGY_PLUGIN_ALERT_TELEGRAM_BOT_TOKEN }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from types import SimpleNamespace

          from quant_platform_kit.common.notification_localization import STRATEGY_PLUGIN_I18N
          from quant_platform_kit.common.strategy_plugins import load_strategy_plugin_signal
          from quant_platform_kit.notifications.strategy_plugin_alerts import (
              StrategyPluginAlertStateSettings,
              publish_strategy_plugin_alerts,
          )

          def _translator(lang: str):
              normalized = str(lang or "zh").strip().lower()
              table = STRATEGY_PLUGIN_I18N["zh" if normalized.startswith("zh") else "en"]

              def translate(key: str, **kwargs):
                  template = table.get(key, key)
                  return template.format(**kwargs) if kwargs else template

              return translate

          def _setting(name: str):
              return os.environ.get(name) or None

          signal = load_strategy_plugin_signal(
              str(Path(os.environ["PLUGIN_OUTPUT_DIR"]) / "latest_signal.json"),
              expected_notification_target=os.environ["PLUGIN_NOTIFICATION_TARGET"],
              expected_plugin=os.environ["PLUGIN_NAME"],
              expected_schema_version="market_regime_control.v1",
          )
          settings = SimpleNamespace(
              strategy_plugin_alert_channels=_setting("STRATEGY_PLUGIN_ALERT_CHANNELS") or "telegram",
              strategy_plugin_alert_email_recipients=_setting("STRATEGY_PLUGIN_ALERT_EMAIL_RECIPIENTS"),
              strategy_plugin_alert_email_sender_email=_setting("STRATEGY_PLUGIN_ALERT_EMAIL_SENDER_EMAIL"),
              strategy_plugin_alert_email_sender_password=_setting("STRATEGY_PLUGIN_ALERT_EMAIL_SENDER_PASSWORD"),
              strategy_plugin_alert_email_smtp_host=_setting("STRATEGY_PLUGIN_ALERT_EMAIL_SMTP_HOST"),
              strategy_plugin_alert_email_smtp_port=_setting("STRATEGY_PLUGIN_ALERT_EMAIL_SMTP_PORT"),
              strategy_plugin_alert_email_smtp_security=_setting("STRATEGY_PLUGIN_ALERT_EMAIL_SMTP_SECURITY"),
              strategy_plugin_alert_sms_recipients=_setting("STRATEGY_PLUGIN_ALERT_SMS_RECIPIENTS"),
              strategy_plugin_alert_sms_provider=_setting("STRATEGY_PLUGIN_ALERT_SMS_PROVIDER"),
              strategy_plugin_alert_sms_account_id=_setting("STRATEGY_PLUGIN_ALERT_SMS_ACCOUNT_ID"),
              strategy_plugin_alert_sms_auth_token=_setting("STRATEGY_PLUGIN_ALERT_SMS_AUTH_TOKEN"),
              strategy_plugin_alert_sms_sender=_setting("STRATEGY_PLUGIN_ALERT_SMS_SENDER"),
              strategy_plugin_alert_sms_messaging_service_id=_setting("STRATEGY_PLUGIN_ALERT_SMS_MESSAGING_SERVICE_ID"),
              strategy_plugin_alert_sms_api_base_url=_setting("STRATEGY_PLUGIN_ALERT_SMS_API_BASE_URL"),
              strategy_plugin_alert_sms_body_max_chars=_setting("STRATEGY_PLUGIN_ALERT_SMS_BODY_MAX_CHARS"),
              strategy_plugin_alert_push_recipients=_setting("STRATEGY_PLUGIN_ALERT_PUSH_RECIPIENTS"),
              strategy_plugin_alert_push_provider=_setting("STRATEGY_PLUGIN_ALERT_PUSH_PROVIDER"),
              strategy_plugin_alert_push_app_token=_setting("STRATEGY_PLUGIN_ALERT_PUSH_APP_TOKEN"),
              strategy_plugin_alert_push_access_token=_setting("STRATEGY_PLUGIN_ALERT_PUSH_ACCESS_TOKEN"),
              strategy_plugin_alert_push_api_base_url=_setting("STRATEGY_PLUGIN_ALERT_PUSH_API_BASE_URL"),
              strategy_plugin_alert_push_device=_setting("STRATEGY_PLUGIN_ALERT_PUSH_DEVICE"),
              strategy_plugin_alert_push_priority=_setting("STRATEGY_PLUGIN_ALERT_PUSH_PRIORITY"),
              strategy_plugin_alert_push_tags=_setting("STRATEGY_PLUGIN_ALERT_PUSH_TAGS"),
              strategy_plugin_alert_push_body_max_chars=_setting("STRATEGY_PLUGIN_ALERT_PUSH_BODY_MAX_CHARS"),
              strategy_plugin_alert_telegram_chat_ids=_setting("STRATEGY_PLUGIN_ALERT_TELEGRAM_CHAT_IDS"),
              strategy_plugin_alert_telegram_bot_token=_setting("STRATEGY_PLUGIN_ALERT_TELEGRAM_BOT_TOKEN"),
              strategy_plugin_alert_telegram_api_base_url=_setting("STRATEGY_PLUGIN_ALERT_TELEGRAM_API_BASE_URL"),
              strategy_plugin_alert_telegram_parse_mode=_setting("STRATEGY_PLUGIN_ALERT_TELEGRAM_PARSE_MODE"),
              strategy_plugin_alert_telegram_disable_web_page_preview=_setting(
                  "STRATEGY_PLUGIN_ALERT_TELEGRAM_DISABLE_WEB_PAGE_PREVIEW"
              ),
              strategy_plugin_alert_telegram_body_max_chars=_setting("STRATEGY_PLUGIN_ALERT_TELEGRAM_BODY_MAX_CHARS"),
          )
          result = publish_strategy_plugin_alerts(
              [signal],
              notification_settings=settings,
              translator=_translator(os.environ.get("STRATEGY_PLUGIN_ALERT_LANG", "zh")),
              context_label=f"strategy-plugin-publish / {os.environ['PLUGIN_NOTIFICATION_TARGET']}",
              state_settings=StrategyPluginAlertStateSettings.from_env(
                  gcp_project_id=os.environ.get("GCP_PROJECT_ID"),
              ),
              log_message=print,
          )
          output_path = Path(os.environ["PLUGIN_OUTPUT_DIR"]) / "unified_alert_result.json"
          output_path.write_text(
              json.dumps(result.to_report_fields(), ensure_ascii=False, indent=2, sort_keys=True),
              encoding="utf-8",
          )
          print(f"wrote unified alert result -> {output_path}")
          print(
              "unified_alert_result "
              f"attempted={result.attempted_count} sent={result.sent_count} "
              f"skipped={result.skipped_count} failed={result.failed_count}"
          )
          if result.failed_count:
              raise SystemExit("unified notification-target alert failed")
          PY

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v7
        with:
          name: strategy-plugin-market-regime-control-${{ matrix.output_scope }}-${{ github.run_id }}
          path: |
            ${{ env.PRICE_INPUT_DIR }}
            ${{ env.PLUGIN_OUTPUT_DIR }}
            ${{ env.RUNNER_OUTPUT_DIR }}
          if-no-files-found: error
          retention-days: 7

      - name: Append job summary
        run: |
          set -euo pipefail
          {
            echo "## Strategy plugin publish"
            echo
            echo "- strategy: \`${STRATEGY_PROFILE}\`"
            echo "- target_type: \`${PLUGIN_TARGET_TYPE}\`"
            echo "- notification_target: \`${PLUGIN_NOTIFICATION_TARGET:-<not set>}\`"
            echo "- plugin: \`${PLUGIN_NAME}\`"
            echo "- schema_version: \`market_regime_control.v1\`"
            echo "- mode: \`shadow\`"
            echo "- plugin_output_dir: \`${PLUGIN_OUTPUT_DIR}\`"
            echo "- gcs_prefix: \`${GCS_PREFIX:-<not set>}\`"
            echo "- execute_publish: \`${EXECUTE_PUBLISH}\`"
            echo
            echo "Generated plugin files:"
            find "${PLUGIN_OUTPUT_DIR}" -type f -print | sort | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

  ibit-zscore-exit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'interactivebrokersquant' }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT: ${{ vars.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}
      EXECUTE_PUBLISH: ${{ github.event_name == 'schedule' && 'true' || inputs.execute_publish }}
      PRICE_START: ${{ inputs.price_start || '2010-01-01' }}
      PRICE_END: ${{ inputs.price_end }}
      INPUT_IBIT_ZSCORE_GCS_PREFIX: ${{ inputs.ibit_zscore_gcs_prefix }}
      INPUT_IBIT_ZSCORE_METRICS_URL: ${{ inputs.ibit_zscore_metrics_url }}
      INPUT_IBIT_ZSCORE_METRICS_URLS: ${{ inputs.ibit_zscore_metrics_urls }}
      IBIT_ZSCORE_GCS_PREFIX: ${{ vars.IBIT_ZSCORE_EXIT_GCS_PREFIX || 'gs://qsl-runtime-logs-shared/strategy-artifacts/us_equity/ibit_smart_dca/plugins/ibit_zscore_exit' }}
      IBIT_ZSCORE_METRICS_URLS: ${{ vars.IBIT_ZSCORE_METRICS_URLS }}
      IBIT_ZSCORE_METRICS_URL: ${{ vars.IBIT_ZSCORE_METRICS_URL || 'https://api.bitcoin-data.com/v1/mvrv-zscore' }}
      BGEOMETRICS_API_TOKEN: ${{ secrets.BGEOMETRICS_API_TOKEN }}
      IBIT_ZSCORE_METRICS_BGEOMETRICS_TOKEN: ${{ secrets.IBIT_ZSCORE_METRICS_BGEOMETRICS_TOKEN }}
      IBIT_ZSCORE_METRICS_QUERY_TOKEN: ${{ secrets.IBIT_ZSCORE_METRICS_QUERY_TOKEN }}
      IBIT_ZSCORE_METRICS_BEARER_TOKEN: ${{ secrets.IBIT_ZSCORE_METRICS_BEARER_TOKEN }}
      IBIT_ZSCORE_METRICS_API_KEY: ${{ secrets.IBIT_ZSCORE_METRICS_API_KEY }}
      IBIT_ZSCORE_METRICS_PROXY: ${{ secrets.IBIT_ZSCORE_METRICS_PROXY }}
      IBIT_ZSCORE_METRICS_PUBLIC_PROXIES: ${{ secrets.IBIT_ZSCORE_METRICS_PUBLIC_PROXIES || vars.IBIT_ZSCORE_METRICS_PUBLIC_PROXIES }}
      IBIT_ZSCORE_METRICS_ALLOW_PUBLIC_PROXY: ${{ vars.IBIT_ZSCORE_METRICS_ALLOW_PUBLIC_PROXY || 'false' }}
      STRATEGY_PROFILE: ibit_smart_dca
      PLUGIN_NAME: ibit_zscore_exit
      PRICE_INPUT_DIR: data/input/strategy_plugins/ibit_smart_dca/ibit_zscore_exit
      PLUGIN_OUTPUT_DIR: data/output/ibit_smart_dca/plugins/ibit_zscore_exit
      RUNNER_OUTPUT_DIR: data/output/strategy_plugins

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Resolve publish target
        run: |
          set -euo pipefail
          gcs_prefix="${INPUT_IBIT_ZSCORE_GCS_PREFIX:-${IBIT_ZSCORE_GCS_PREFIX}}"
          metrics_urls="${INPUT_IBIT_ZSCORE_METRICS_URLS:-${IBIT_ZSCORE_METRICS_URLS:-}}"
          if [ -z "${metrics_urls:-}" ]; then
            metrics_urls="${INPUT_IBIT_ZSCORE_METRICS_URL:-${IBIT_ZSCORE_METRICS_URL:-}}"
          fi
          if [ -z "${metrics_urls:-}" ]; then
            echo "IBIT zscore metrics URL is required; set vars.IBIT_ZSCORE_METRICS_URLS, vars.IBIT_ZSCORE_METRICS_URL, or workflow input."
            exit 1
          fi
          {
            echo "GCS_PREFIX=${gcs_prefix}"
            echo "ZSCORE_METRICS_URLS<<EOF"
            printf '%s\n' "${metrics_urls}"
            echo "EOF"
          } >> "$GITHUB_ENV"
          echo "Resolved ${STRATEGY_PROFILE} ${PLUGIN_NAME} publish prefix: ${gcs_prefix}"
          python - <<'PY'
          import os
          from urllib.parse import urlparse

          urls = []
          for value in os.environ["ZSCORE_METRICS_URLS"].replace(",", "\n").splitlines():
              value = value.strip()
              if value:
                  urls.append(value)
          hosts = [urlparse(url).netloc or "<local>" for url in urls]
          print("Resolved IBIT zscore metrics hosts: " + ", ".join(dict.fromkeys(hosts)))
          PY

      - name: Check whether Google Cloud auth is needed
        id: ibit-zscore-gcp-auth-check
        run: |
          set -euo pipefail
          needed=false
          if [ "${EXECUTE_PUBLISH}" = "true" ] && [ -n "${GCS_PREFIX:-}" ]; then
            needed=true
          fi
          echo "needed=${needed}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        if: steps.ibit-zscore-gcp-auth-check.outputs.needed == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: steps.ibit-zscore-gcp-auth-check.outputs.needed == 'true'
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: '>= 416.0.0'

      - name: Download IBIT zscore metrics
        run: |
          set -euo pipefail
          mkdir -p "${PRICE_INPUT_DIR}"
          output_path="${PRICE_INPUT_DIR}/ibit_zscore_metrics.csv"
          args=(--output "${output_path}" --start "${PRICE_START}")
          if [ -n "${PRICE_END:-}" ]; then
            args+=(--end "${PRICE_END}")
          fi
          python scripts/download_ibit_zscore_metrics.py "${args[@]}"
          test -f "${output_path}"

      - name: Build strategy plugin artifact
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_OUTPUT_DIR}" "${PLUGIN_OUTPUT_DIR}"
          config_path="${RUNNER_TEMP:-/tmp}/strategy_plugins.toml"
          zscore_path="${PRICE_INPUT_DIR}/ibit_zscore_metrics.csv"
          cat > "${config_path}" <<EOF
          output_dir = "${RUNNER_OUTPUT_DIR}"
          default_mode = "shadow"

          [[strategy_plugins]]
          strategy = "${STRATEGY_PROFILE}"
          plugin = "${PLUGIN_NAME}"
          enabled = true

          [strategy_plugins.inputs]
          zscore_metrics = "${zscore_path}"
          dynamic_lookback_days = 1460
          dynamic_min_periods = 365
          soft_exit_percentile = 0.95
          hard_exit_percentile = 0.985
          soft_exit_zscore_floor = 5.0
          hard_exit_zscore_floor = 7.0
          soft_exit_zscore_cap = 8.0
          hard_exit_zscore_cap = 10.0
          risk_reduced_ibit_exposure = 0.50
          risk_off_ibit_exposure = 0.25
          parking_symbol = "BOXX"

          [strategy_plugins.outputs]
          output_dir = "${PLUGIN_OUTPUT_DIR}"
          EOF
          python scripts/run_strategy_plugins.py --config "${config_path}" --strategies "${STRATEGY_PROFILE}" --plugins "${PLUGIN_NAME}"
          test -f "${PLUGIN_OUTPUT_DIR}/latest_signal.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads((Path(os.environ["PLUGIN_OUTPUT_DIR"]) / "latest_signal.json").read_text(encoding="utf-8"))
          if payload.get("strategy") != os.environ["STRATEGY_PROFILE"]:
              raise SystemExit(f"unexpected strategy: {payload.get('strategy')!r}")
          if payload.get("plugin") != os.environ["PLUGIN_NAME"]:
              raise SystemExit(f"unexpected plugin: {payload.get('plugin')!r}")
          if payload.get("schema_version") != "ibit_zscore_exit.v1":
              raise SystemExit(f"unexpected schema_version: {payload.get('schema_version')!r}")
          if payload.get("effective_mode") != "shadow":
              raise SystemExit(f"unexpected effective_mode: {payload.get('effective_mode')!r}")
          controls = payload.get("execution_controls") or {}
          if controls.get("strategy_runtime_metadata_allowed") is not True:
              raise SystemExit("IBIT zscore artifact must be mountable as strategy metadata")
          if controls.get("position_control_allowed") is not True:
              raise SystemExit("IBIT zscore artifact must allow position control")
          if controls.get("consumption_evidence_status") != "automation_approved":
              raise SystemExit("IBIT zscore artifact must be automation approved")
          target_allocations = (payload.get("position_control") or {}).get("target_allocations") or {}
          if "IBIT" not in target_allocations or "BOXX" not in target_allocations:
              raise SystemExit(f"unexpected target_allocations: {target_allocations!r}")
          print(
              "validated latest_signal "
              f"as_of={payload.get('as_of')} route={payload.get('canonical_route')} "
              f"action={payload.get('suggested_action')}"
          )
          PY
          python - <<'PY'
          import os
          from pathlib import Path

          from us_equity_snapshot_pipelines.artifacts import write_strategy_plugin_release_manifest

          manifest = write_strategy_plugin_release_manifest(
              output_dir=Path(os.environ["PLUGIN_OUTPUT_DIR"]),
              repository=os.environ.get("GITHUB_REPOSITORY"),
              git_sha=os.environ.get("GITHUB_SHA"),
              run_id=os.environ.get("GITHUB_RUN_ID"),
              run_attempt=os.environ.get("GITHUB_RUN_ATTEMPT"),
          )
          print(f"wrote strategy plugin release manifest -> {manifest}")
          PY
          test -f "${PLUGIN_OUTPUT_DIR}/release_manifest.json"
          test -d "${PLUGIN_OUTPUT_DIR}/releases"

      - name: Publish or print GCS plan
        run: |
          set -euo pipefail
          if [ -z "${GCS_PREFIX:-}" ]; then
            echo "GCS_PREFIX is not set; skipping GCS publish."
            exit 0
          fi

          if [ "${EXECUTE_PUBLISH}" = "true" ]; then
            python - <<'PY'
          import os

          from us_equity_snapshot_pipelines.artifacts import normalize_strategy_plugin_gcs_prefix

          prefix = normalize_strategy_plugin_gcs_prefix(os.environ["GCS_PREFIX"])
          print(f"Validated strategy plugin GCS prefix: {prefix}")
          PY
          fi

          normalized_prefix="${GCS_PREFIX%/}"
          while IFS= read -r -d '' source_path; do
            relative_path="${source_path#${PLUGIN_OUTPUT_DIR}/}"
            destination="${normalized_prefix}/${relative_path}"
            if [ "${EXECUTE_PUBLISH}" = "true" ]; then
              gcloud storage cp "${source_path}" "${destination}"
            else
              echo "DRY-RUN gcloud storage cp ${source_path} ${destination}"
            fi
          done < <(find "${PLUGIN_OUTPUT_DIR}" -type f -print0 | sort -z)

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v7
        with:
          name: strategy-plugin-ibit-zscore-exit-${{ github.run_id }}
          path: |
            ${{ env.PRICE_INPUT_DIR }}
            ${{ env.PLUGIN_OUTPUT_DIR }}
            ${{ env.RUNNER_OUTPUT_DIR }}
          if-no-files-found: error
          retention-days: 7

      - name: Append job summary
        run: |
          set -euo pipefail
          {
            echo "## Strategy plugin publish"
            echo
            echo "- strategy: \`${STRATEGY_PROFILE}\`"
            echo "- plugin: \`${PLUGIN_NAME}\`"
            echo "- mode: \`shadow\`"
            echo "- plugin_output_dir: \`${PLUGIN_OUTPUT_DIR}\`"
            echo "- gcs_prefix: \`${GCS_PREFIX:-<not set>}\`"
            echo "- execute_publish: \`${EXECUTE_PUBLISH}\`"
            echo
            echo "Generated plugin files:"
            find "${PLUGIN_OUTPUT_DIR}" -type f -print | sort | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

