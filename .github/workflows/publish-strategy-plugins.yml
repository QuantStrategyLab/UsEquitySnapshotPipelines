name: Publish Strategy Plugins

on:
  schedule:
    # Weekdays after the regular US close. The plugin itself enforces freshness.
    - cron: '30 22 * * 1-5'
  workflow_dispatch:
    inputs:
      execute_publish:
        description: Actually upload plugin artifacts to GCS. false only builds and uploads a GitHub artifact.
        required: true
        default: false
        type: boolean
      price_start:
        description: Earliest yfinance price download date.
        required: false
        default: '2010-01-01'
        type: string
      price_end:
        description: Optional yfinance price download end date.
        required: false
        type: string
      gcs_prefix:
        description: Optional legacy TQQQ GCS prefix override.
        required: false
        type: string
      taco_gcs_prefix:
        description: Optional TQQQ TACO rebound GCS prefix override.
        required: false
        type: string
      market_regime_gcs_prefix:
        description: Optional TQQQ market regime control GCS prefix override.
        required: false
        type: string
      market_regime_soxl_gcs_prefix:
        description: Optional SOXL market regime notification GCS prefix override.
        required: false
        type: string
      market_regime_soxl_strategy_gcs_prefix:
        description: Optional SOXL market regime strategy GCS prefix override.
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  market-regime-control:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - strategy_profile: tqqq_growth_income
            target_type: strategy
            notification_target: ''
            output_scope: tqqq_growth_income
            benchmark_symbol: QQQ
            attack_symbol: TQQQ
            event_set: full-plus-geopolitical-deescalation
            start_date: '2018-01-01'
            taco_enabled: 'true'
          - strategy_profile: soxl_soxx_trend_income
            target_type: notification_target
            notification_target: market_regime_notification
            output_scope: market_regime_notification
            benchmark_symbol: SOXX
            attack_symbol: SOXL
            event_set: full
            start_date: '2010-01-01'
            taco_enabled: 'false'
          - strategy_profile: soxl_soxx_trend_income
            target_type: strategy
            notification_target: ''
            output_scope: soxl_soxx_trend_income
            benchmark_symbol: SOXX
            attack_symbol: SOXL
            event_set: full
            start_date: '2010-01-01'
            taco_enabled: 'false'
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'interactivebrokersquant' }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT: ${{ vars.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}
      EXECUTE_PUBLISH: ${{ github.event_name == 'schedule' && 'true' || inputs.execute_publish }}
      PRICE_START: ${{ inputs.price_start || '2010-01-01' }}
      PRICE_END: ${{ inputs.price_end }}
      INPUT_MARKET_REGIME_GCS_PREFIX: ${{ inputs.market_regime_gcs_prefix }}
      INPUT_MARKET_REGIME_SOXL_GCS_PREFIX: ${{ inputs.market_regime_soxl_gcs_prefix }}
      INPUT_MARKET_REGIME_SOXL_STRATEGY_GCS_PREFIX: ${{ inputs.market_regime_soxl_strategy_gcs_prefix }}
      MARKET_REGIME_TQQQ_GCS_PREFIX: ${{ vars.MARKET_REGIME_CONTROL_GCS_PREFIX || 'gs://qsl-runtime-logs-shared/strategy-artifacts/us_equity/tqqq_growth_income/plugins/market_regime_control' }}
      MARKET_REGIME_SOXL_GCS_PREFIX: ${{ vars.MARKET_REGIME_CONTROL_SOXL_GCS_PREFIX || 'gs://qsl-runtime-logs-shared/strategy-artifacts/us_equity/market_regime_notification/plugins/market_regime_control' }}
      MARKET_REGIME_SOXL_STRATEGY_GCS_PREFIX: ${{ vars.MARKET_REGIME_CONTROL_SOXL_STRATEGY_GCS_PREFIX || 'gs://qsl-runtime-logs-shared/strategy-artifacts/us_equity/soxl_soxx_trend_income/plugins/market_regime_control' }}
      YFINANCE_PROXY: ${{ secrets.YFINANCE_PROXY }}
      STRATEGY_PROFILE: ${{ matrix.strategy_profile }}
      PLUGIN_TARGET_TYPE: ${{ matrix.target_type }}
      PLUGIN_NOTIFICATION_TARGET: ${{ matrix.notification_target }}
      PLUGIN_NAME: market_regime_control
      PLUGIN_BENCHMARK_SYMBOL: ${{ matrix.benchmark_symbol }}
      PLUGIN_ATTACK_SYMBOL: ${{ matrix.attack_symbol }}
      PLUGIN_EVENT_SET: ${{ matrix.event_set }}
      PLUGIN_START_DATE: ${{ matrix.start_date }}
      PLUGIN_TACO_ENABLED: ${{ matrix.taco_enabled }}
      PRICE_INPUT_DIR: data/input/strategy_plugins/${{ matrix.strategy_profile }}/market_regime_control
      PLUGIN_OUTPUT_DIR: data/output/${{ matrix.output_scope }}/plugins/market_regime_control
      RUNNER_OUTPUT_DIR: data/output/strategy_plugins

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Resolve publish target
        run: |
          set -euo pipefail
          if [ "${STRATEGY_PROFILE}" = "soxl_soxx_trend_income" ] && [ "${PLUGIN_TARGET_TYPE}" = "strategy" ]; then
            gcs_prefix="${INPUT_MARKET_REGIME_SOXL_STRATEGY_GCS_PREFIX:-${MARKET_REGIME_SOXL_STRATEGY_GCS_PREFIX}}"
          elif [ "${STRATEGY_PROFILE}" = "soxl_soxx_trend_income" ]; then
            gcs_prefix="${INPUT_MARKET_REGIME_SOXL_GCS_PREFIX:-${MARKET_REGIME_SOXL_GCS_PREFIX}}"
          else
            gcs_prefix="${INPUT_MARKET_REGIME_GCS_PREFIX:-${MARKET_REGIME_TQQQ_GCS_PREFIX}}"
          fi
          echo "GCS_PREFIX=${gcs_prefix}" >> "$GITHUB_ENV"
          echo "Resolved ${STRATEGY_PROFILE} ${PLUGIN_NAME} publish prefix: ${gcs_prefix}"

      - name: Check whether Google Cloud auth is needed
        id: market-regime-gcp-auth-check
        run: |
          set -euo pipefail
          needed=false
          if [ "${EXECUTE_PUBLISH}" = "true" ] && [ -n "${GCS_PREFIX:-}" ]; then
            needed=true
          fi
          echo "needed=${needed}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        if: steps.market-regime-gcp-auth-check.outputs.needed == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: steps.market-regime-gcp-auth-check.outputs.needed == 'true'
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: '>= 416.0.0'

      - name: Download plugin price inputs
        run: |
          set -euo pipefail
          mkdir -p "${PRICE_INPUT_DIR}"
          python - <<'PY'
          import os
          from pathlib import Path

          from us_equity_snapshot_pipelines.yfinance_prices import download_price_history

          symbols = [
              os.environ["PLUGIN_BENCHMARK_SYMBOL"],
              os.environ["PLUGIN_ATTACK_SYMBOL"],
              "SPY",
              "^VIX",
              "HYG",
              "IEF",
              "LQD",
              "XLF",
              "KRE",
              "TLT",
          ]
          symbols = list(dict.fromkeys(str(symbol).strip().upper() for symbol in symbols if str(symbol).strip()))
          output_path = Path(os.environ["PRICE_INPUT_DIR"]) / "market_regime_control_price_history.csv"
          prices = download_price_history(
              symbols,
              start=os.environ.get("PRICE_START") or "2010-01-01",
              end=os.environ.get("PRICE_END") or None,
              proxy=os.environ.get("YFINANCE_PROXY") or None,
          )
          prices.to_csv(output_path, index=False)
          print(f"downloaded {len(prices)} price rows -> {output_path}")
          PY

      - name: Build strategy plugin artifact
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_OUTPUT_DIR}" "${PLUGIN_OUTPUT_DIR}"
          config_path="${RUNNER_TEMP:-/tmp}/strategy_plugins.toml"
          prices_path="${PRICE_INPUT_DIR}/market_regime_control_price_history.csv"
          if [ "${PLUGIN_TARGET_TYPE}" = "notification_target" ]; then
            cat > "${config_path}" <<EOF
          output_dir = "${RUNNER_OUTPUT_DIR}"
          default_mode = "shadow"

          [[notification_targets]]
          notification_target = "${PLUGIN_NOTIFICATION_TARGET}"
          plugin = "${PLUGIN_NAME}"
          enabled = true

          [notification_targets.inputs]
          prices = "${prices_path}"
          event_set = "${PLUGIN_EVENT_SET}"
          start_date = "${PLUGIN_START_DATE}"
          benchmark_symbol = "${PLUGIN_BENCHMARK_SYMBOL}"
          attack_symbol = "${PLUGIN_ATTACK_SYMBOL}"
          vix_symbols = ["VIX", "^VIX", "VIXCLS"]
          credit_pairs = ["HYG:IEF", "LQD:IEF"]
          financial_symbols = ["XLF", "KRE"]
          rate_symbols = ["IEF", "TLT"]
          strategy_policy = "levered_growth_income_v1"
          realized_vol_threshold = 0.30
          realized_vol_requires_confirmation = true
          delever_risk_asset_scalar = 0.0
          taco_opportunity_size_scalar = 0.0
          crisis_enabled = true
          macro_enabled = true
          taco_enabled = ${PLUGIN_TACO_ENABLED}

          [notification_targets.outputs]
          output_dir = "${PLUGIN_OUTPUT_DIR}"
          EOF
            selector_args=(--notification-targets "${PLUGIN_NOTIFICATION_TARGET}")
          else
            cat > "${config_path}" <<EOF
          output_dir = "${RUNNER_OUTPUT_DIR}"
          default_mode = "shadow"

          [[strategy_plugins]]
          strategy = "${STRATEGY_PROFILE}"
          plugin = "${PLUGIN_NAME}"
          enabled = true

          [strategy_plugins.inputs]
          prices = "${prices_path}"
          event_set = "${PLUGIN_EVENT_SET}"
          start_date = "${PLUGIN_START_DATE}"
          benchmark_symbol = "${PLUGIN_BENCHMARK_SYMBOL}"
          attack_symbol = "${PLUGIN_ATTACK_SYMBOL}"
          vix_symbols = ["VIX", "^VIX", "VIXCLS"]
          credit_pairs = ["HYG:IEF", "LQD:IEF"]
          financial_symbols = ["XLF", "KRE"]
          rate_symbols = ["IEF", "TLT"]
          strategy_policy = "levered_growth_income_v1"
          realized_vol_threshold = 0.30
          realized_vol_requires_confirmation = true
          delever_risk_asset_scalar = 0.0
          taco_opportunity_size_scalar = 0.0
          crisis_enabled = true
          macro_enabled = true
          taco_enabled = ${PLUGIN_TACO_ENABLED}

          [strategy_plugins.outputs]
          output_dir = "${PLUGIN_OUTPUT_DIR}"
          EOF
            selector_args=(--strategies "${STRATEGY_PROFILE}")
          fi
          python scripts/run_strategy_plugins.py --config "${config_path}" --plugins "${PLUGIN_NAME}" "${selector_args[@]}"
          test -f "${PLUGIN_OUTPUT_DIR}/latest_signal.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads((Path(os.environ["PLUGIN_OUTPUT_DIR"]) / "latest_signal.json").read_text(encoding="utf-8"))
          target_type = os.environ["PLUGIN_TARGET_TYPE"]
          if target_type == "notification_target":
              if payload.get("target_type") != "notification_target":
                  raise SystemExit(f"unexpected target_type: {payload.get('target_type')!r}")
              if payload.get("notification_target") != os.environ["PLUGIN_NOTIFICATION_TARGET"]:
                  raise SystemExit(f"unexpected notification_target: {payload.get('notification_target')!r}")
          else:
              if payload.get("strategy") != os.environ["STRATEGY_PROFILE"]:
                  raise SystemExit(f"unexpected strategy: {payload.get('strategy')!r}")
          if payload.get("plugin") != os.environ["PLUGIN_NAME"]:
              raise SystemExit(f"unexpected plugin: {payload.get('plugin')!r}")
          if payload.get("schema_version") != "market_regime_control.v1":
              raise SystemExit(f"unexpected schema_version: {payload.get('schema_version')!r}")
          if payload.get("effective_mode") != "shadow":
              raise SystemExit(f"unexpected effective_mode: {payload.get('effective_mode')!r}")
          controls = payload.get("execution_controls") or {}
          if controls.get("broker_order_allowed") or controls.get("live_allocation_mutation_allowed"):
              raise SystemExit("market regime artifact must not allow broker/allocation mutation")
          if target_type == "notification_target":
              if controls.get("strategy_runtime_metadata_allowed") is not False:
                  raise SystemExit("notification target artifact must not be mountable as strategy metadata")
              if controls.get("position_control_allowed") is not False:
                  raise SystemExit("notification target artifact must not allow position control")
          else:
              if controls.get("strategy_runtime_metadata_allowed") is not True:
                  raise SystemExit("market regime artifact must be mountable as strategy metadata")
              if not isinstance(payload.get("position_control"), dict):
                  raise SystemExit("market regime artifact must include position_control")
          if not isinstance(payload.get("notification"), dict):
              raise SystemExit("market regime artifact must include notification")
          print(
              "validated latest_signal "
              f"as_of={payload.get('as_of')} route={payload.get('canonical_route')} "
              f"action={payload.get('suggested_action')}"
          )
          PY
          python - <<'PY'
          import os
          from pathlib import Path

          from us_equity_snapshot_pipelines.artifacts import write_strategy_plugin_release_manifest

          manifest = write_strategy_plugin_release_manifest(
              output_dir=Path(os.environ["PLUGIN_OUTPUT_DIR"]),
              repository=os.environ.get("GITHUB_REPOSITORY"),
              git_sha=os.environ.get("GITHUB_SHA"),
              run_id=os.environ.get("GITHUB_RUN_ID"),
              run_attempt=os.environ.get("GITHUB_RUN_ATTEMPT"),
          )
          print(f"wrote strategy plugin release manifest -> {manifest}")
          PY
          test -f "${PLUGIN_OUTPUT_DIR}/release_manifest.json"
          test -d "${PLUGIN_OUTPUT_DIR}/releases"

      - name: Publish or print GCS plan
        run: |
          set -euo pipefail
          if [ -z "${GCS_PREFIX:-}" ]; then
            echo "GCS_PREFIX is not set; skipping GCS publish."
            exit 0
          fi

          normalized_prefix="${GCS_PREFIX%/}"
          while IFS= read -r -d '' source_path; do
            relative_path="${source_path#${PLUGIN_OUTPUT_DIR}/}"
            destination="${normalized_prefix}/${relative_path}"
            if [ "${EXECUTE_PUBLISH}" = "true" ]; then
              gcloud storage cp "${source_path}" "${destination}"
            else
              echo "DRY-RUN gcloud storage cp ${source_path} ${destination}"
            fi
          done < <(find "${PLUGIN_OUTPUT_DIR}" -type f -print0 | sort -z)

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v7
        with:
          name: strategy-plugin-market-regime-control-${{ matrix.output_scope }}-${{ github.run_id }}
          path: |
            ${{ env.PRICE_INPUT_DIR }}
            ${{ env.PLUGIN_OUTPUT_DIR }}
            ${{ env.RUNNER_OUTPUT_DIR }}
          if-no-files-found: error
          retention-days: 7

      - name: Append job summary
        run: |
          set -euo pipefail
          {
            echo "## Strategy plugin publish"
            echo
            echo "- strategy: \`${STRATEGY_PROFILE}\`"
            echo "- target_type: \`${PLUGIN_TARGET_TYPE}\`"
            echo "- notification_target: \`${PLUGIN_NOTIFICATION_TARGET:-<not set>}\`"
            echo "- plugin: \`${PLUGIN_NAME}\`"
            echo "- schema_version: \`market_regime_control.v1\`"
            echo "- mode: \`shadow\`"
            echo "- plugin_output_dir: \`${PLUGIN_OUTPUT_DIR}\`"
            echo "- gcs_prefix: \`${GCS_PREFIX:-<not set>}\`"
            echo "- execute_publish: \`${EXECUTE_PUBLISH}\`"
            echo
            echo "Generated plugin files:"
            find "${PLUGIN_OUTPUT_DIR}" -type f -print | sort | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

  crisis-response-shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - strategy_profile: tqqq_growth_income
            benchmark_symbol: QQQ
            attack_symbol: TQQQ
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'interactivebrokersquant' }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT: ${{ vars.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}
      EXECUTE_PUBLISH: ${{ github.event_name == 'schedule' && 'true' || inputs.execute_publish }}
      PRICE_START: ${{ inputs.price_start || '2010-01-01' }}
      PRICE_END: ${{ inputs.price_end }}
      INPUT_TQQQ_GCS_PREFIX: ${{ inputs.gcs_prefix }}
      TQQQ_GCS_PREFIX: ${{ vars.CRISIS_RESPONSE_SHADOW_GCS_PREFIX || 'gs://qsl-runtime-logs-shared/strategy-artifacts/us_equity/tqqq_growth_income/plugins/crisis_response_shadow' }}
      YFINANCE_PROXY: ${{ secrets.YFINANCE_PROXY }}
      STRATEGY_PROFILE: ${{ matrix.strategy_profile }}
      PLUGIN_NAME: crisis_response_shadow
      PLUGIN_BENCHMARK_SYMBOL: ${{ matrix.benchmark_symbol }}
      PLUGIN_ATTACK_SYMBOL: ${{ matrix.attack_symbol }}
      PRICE_INPUT_DIR: data/input/strategy_plugins/${{ matrix.strategy_profile }}/crisis_response_shadow
      PLUGIN_OUTPUT_DIR: data/output/${{ matrix.strategy_profile }}/plugins/crisis_response_shadow
      RUNNER_OUTPUT_DIR: data/output/strategy_plugins

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Resolve publish target
        run: |
          set -euo pipefail
          gcs_prefix="${INPUT_TQQQ_GCS_PREFIX:-${TQQQ_GCS_PREFIX}}"
          echo "GCS_PREFIX=${gcs_prefix}" >> "$GITHUB_ENV"
          echo "Resolved ${STRATEGY_PROFILE} ${PLUGIN_NAME} publish prefix: ${gcs_prefix}"

      - name: Check whether Google Cloud auth is needed
        id: gcp-auth-check
        run: |
          set -euo pipefail
          needed=false
          if [ "${EXECUTE_PUBLISH}" = "true" ] && [ -n "${GCS_PREFIX:-}" ]; then
            needed=true
          fi
          echo "needed=${needed}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        if: steps.gcp-auth-check.outputs.needed == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: steps.gcp-auth-check.outputs.needed == 'true'
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: '>= 416.0.0'

      - name: Download plugin price inputs
        run: |
          set -euo pipefail
          mkdir -p "${PRICE_INPUT_DIR}"
          python - <<'PY'
          import os
          from pathlib import Path

          from quant_strategy_plugins.crisis_response_shadow_plugin import (
              DEFAULT_CONTEXT_CREDIT_PAIRS,
              DEFAULT_CONTEXT_FINANCIAL_SYMBOLS,
              DEFAULT_CONTEXT_RATE_SYMBOLS,
              DEFAULT_MARKET_SYMBOL,
          )
          from us_equity_snapshot_pipelines.yfinance_prices import download_price_history

          benchmark_symbol = os.environ["PLUGIN_BENCHMARK_SYMBOL"]
          attack_symbol = os.environ["PLUGIN_ATTACK_SYMBOL"]
          symbols = [
              benchmark_symbol,
              attack_symbol,
              DEFAULT_MARKET_SYMBOL,
              *DEFAULT_CONTEXT_FINANCIAL_SYMBOLS,
              *DEFAULT_CONTEXT_RATE_SYMBOLS,
          ]
          for numerator, denominator in DEFAULT_CONTEXT_CREDIT_PAIRS:
              symbols.extend([numerator, denominator])
          symbols = list(dict.fromkeys(str(symbol).strip().upper() for symbol in symbols if str(symbol).strip()))

          output_path = Path(os.environ["PRICE_INPUT_DIR"]) / "crisis_response_shadow_price_history.csv"
          prices = download_price_history(
              symbols,
              start=os.environ.get("PRICE_START") or "2010-01-01",
              end=os.environ.get("PRICE_END") or None,
              proxy=os.environ.get("YFINANCE_PROXY") or None,
          )
          prices.to_csv(output_path, index=False)
          print(f"downloaded {len(prices)} price rows -> {output_path}")
          PY

      - name: Build strategy plugin artifact
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_OUTPUT_DIR}" "${PLUGIN_OUTPUT_DIR}"
          config_path="${RUNNER_TEMP:-/tmp}/strategy_plugins.toml"
          prices_path="${PRICE_INPUT_DIR}/crisis_response_shadow_price_history.csv"
          cat > "${config_path}" <<EOF
          output_dir = "${RUNNER_OUTPUT_DIR}"
          default_mode = "shadow"

          [[strategy_plugins]]
          strategy = "${STRATEGY_PROFILE}"
          plugin = "${PLUGIN_NAME}"
          enabled = true

          [strategy_plugins.inputs]
          prices = "${prices_path}"
          event_set = "full"
          benchmark_symbol = "${PLUGIN_BENCHMARK_SYMBOL}"
          attack_symbol = "${PLUGIN_ATTACK_SYMBOL}"
          financial_symbols = ["XLF", "KRE"]
          credit_pairs = ["HYG:IEF", "LQD:IEF"]
          rate_symbols = ["IEF", "TLT"]

          [strategy_plugins.outputs]
          output_dir = "${PLUGIN_OUTPUT_DIR}"
          EOF
          python scripts/run_strategy_plugins.py --config "${config_path}" --strategies "${STRATEGY_PROFILE}" --plugins "${PLUGIN_NAME}"
          test -f "${PLUGIN_OUTPUT_DIR}/latest_signal.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads((Path(os.environ["PLUGIN_OUTPUT_DIR"]) / "latest_signal.json").read_text(encoding="utf-8"))
          if payload.get("strategy") != os.environ["STRATEGY_PROFILE"]:
              raise SystemExit(f"unexpected strategy: {payload.get('strategy')!r}")
          if payload.get("plugin") != os.environ["PLUGIN_NAME"]:
              raise SystemExit(f"unexpected plugin: {payload.get('plugin')!r}")
          if payload.get("effective_mode") != "shadow":
              raise SystemExit(f"unexpected effective_mode: {payload.get('effective_mode')!r}")
          print(
              "validated latest_signal "
              f"as_of={payload.get('as_of')} route={payload.get('canonical_route')} "
              f"action={payload.get('suggested_action')}"
          )
          PY

      - name: Publish or print GCS plan
        run: |
          set -euo pipefail
          if [ -z "${GCS_PREFIX:-}" ]; then
            echo "GCS_PREFIX is not set; skipping GCS publish."
            exit 0
          fi

          normalized_prefix="${GCS_PREFIX%/}"
          while IFS= read -r -d '' source_path; do
            relative_path="${source_path#${PLUGIN_OUTPUT_DIR}/}"
            destination="${normalized_prefix}/${relative_path}"
            if [ "${EXECUTE_PUBLISH}" = "true" ]; then
              gcloud storage cp "${source_path}" "${destination}"
            else
              echo "DRY-RUN gcloud storage cp ${source_path} ${destination}"
            fi
          done < <(find "${PLUGIN_OUTPUT_DIR}" -type f -print0 | sort -z)

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v7
        with:
          name: strategy-plugin-crisis-response-shadow-${{ matrix.strategy_profile }}-${{ github.run_id }}
          path: |
            ${{ env.PRICE_INPUT_DIR }}
            ${{ env.PLUGIN_OUTPUT_DIR }}
            ${{ env.RUNNER_OUTPUT_DIR }}
          if-no-files-found: error
          retention-days: 7

      - name: Append job summary
        run: |
          set -euo pipefail
          {
            echo "## Strategy plugin publish"
            echo
            echo "- strategy: \`${STRATEGY_PROFILE}\`"
            echo "- plugin: \`${PLUGIN_NAME}\`"
            echo "- mode: \`shadow\`"
            echo "- plugin_output_dir: \`${PLUGIN_OUTPUT_DIR}\`"
            echo "- gcs_prefix: \`${GCS_PREFIX:-<not set>}\`"
            echo "- execute_publish: \`${EXECUTE_PUBLISH}\`"
            echo
            echo "Generated plugin files:"
            find "${PLUGIN_OUTPUT_DIR}" -type f -print | sort | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

  taco-rebound-shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'interactivebrokersquant' }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT: ${{ vars.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}
      EXECUTE_PUBLISH: ${{ github.event_name == 'schedule' && 'true' || inputs.execute_publish }}
      PRICE_START: ${{ inputs.price_start || '2010-01-01' }}
      PRICE_END: ${{ inputs.price_end }}
      INPUT_TACO_GCS_PREFIX: ${{ inputs.taco_gcs_prefix }}
      TACO_GCS_PREFIX: ${{ vars.TACO_REBOUND_SHADOW_GCS_PREFIX || 'gs://qsl-runtime-logs-shared/strategy-artifacts/us_equity/tqqq_growth_income/plugins/taco_rebound_shadow' }}
      YFINANCE_PROXY: ${{ secrets.YFINANCE_PROXY }}
      STRATEGY_PROFILE: tqqq_growth_income
      PLUGIN_NAME: taco_rebound_shadow
      PLUGIN_BENCHMARK_SYMBOL: QQQ
      PLUGIN_ATTACK_SYMBOL: TQQQ
      PLUGIN_EVENT_SET: full-plus-geopolitical-deescalation
      PLUGIN_START_DATE: '2018-01-01'
      PRICE_INPUT_DIR: data/input/strategy_plugins/tqqq_growth_income/taco_rebound_shadow
      PLUGIN_OUTPUT_DIR: data/output/tqqq_growth_income/plugins/taco_rebound_shadow
      RUNNER_OUTPUT_DIR: data/output/strategy_plugins

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Resolve publish target
        run: |
          set -euo pipefail
          gcs_prefix="${INPUT_TACO_GCS_PREFIX:-${TACO_GCS_PREFIX}}"
          echo "GCS_PREFIX=${gcs_prefix}" >> "$GITHUB_ENV"
          echo "Resolved ${STRATEGY_PROFILE} ${PLUGIN_NAME} publish prefix: ${gcs_prefix}"

      - name: Check whether Google Cloud auth is needed
        id: gcp-auth-check
        run: |
          set -euo pipefail
          needed=false
          if [ "${EXECUTE_PUBLISH}" = "true" ] && [ -n "${GCS_PREFIX:-}" ]; then
            needed=true
          fi
          echo "needed=${needed}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        if: steps.gcp-auth-check.outputs.needed == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: steps.gcp-auth-check.outputs.needed == 'true'
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: '>= 416.0.0'

      - name: Download plugin price inputs
        run: |
          set -euo pipefail
          mkdir -p "${PRICE_INPUT_DIR}"
          python - <<'PY'
          import os
          from pathlib import Path

          from us_equity_snapshot_pipelines.yfinance_prices import download_price_history

          symbols = [
              os.environ["PLUGIN_BENCHMARK_SYMBOL"],
              os.environ["PLUGIN_ATTACK_SYMBOL"],
          ]
          output_path = Path(os.environ["PRICE_INPUT_DIR"]) / "taco_rebound_shadow_price_history.csv"
          prices = download_price_history(
              symbols,
              start=os.environ.get("PRICE_START") or "2010-01-01",
              end=os.environ.get("PRICE_END") or None,
              proxy=os.environ.get("YFINANCE_PROXY") or None,
          )
          prices.to_csv(output_path, index=False)
          print(f"downloaded {len(prices)} price rows -> {output_path}")
          PY

      - name: Build strategy plugin artifact
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_OUTPUT_DIR}" "${PLUGIN_OUTPUT_DIR}"
          config_path="${RUNNER_TEMP:-/tmp}/strategy_plugins.toml"
          prices_path="${PRICE_INPUT_DIR}/taco_rebound_shadow_price_history.csv"
          cat > "${config_path}" <<EOF
          output_dir = "${RUNNER_OUTPUT_DIR}"
          default_mode = "shadow"

          [[strategy_plugins]]
          strategy = "${STRATEGY_PROFILE}"
          plugin = "${PLUGIN_NAME}"
          enabled = true

          [strategy_plugins.inputs]
          prices = "${prices_path}"
          event_set = "${PLUGIN_EVENT_SET}"
          start_date = "${PLUGIN_START_DATE}"
          benchmark_symbol = "${PLUGIN_BENCHMARK_SYMBOL}"
          attack_symbol = "${PLUGIN_ATTACK_SYMBOL}"

          [strategy_plugins.outputs]
          output_dir = "${PLUGIN_OUTPUT_DIR}"
          EOF
          python scripts/run_strategy_plugins.py --config "${config_path}" --strategies "${STRATEGY_PROFILE}" --plugins "${PLUGIN_NAME}"
          test -f "${PLUGIN_OUTPUT_DIR}/latest_signal.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads((Path(os.environ["PLUGIN_OUTPUT_DIR"]) / "latest_signal.json").read_text(encoding="utf-8"))
          if payload.get("strategy") != os.environ["STRATEGY_PROFILE"]:
              raise SystemExit(f"unexpected strategy: {payload.get('strategy')!r}")
          if payload.get("plugin") != os.environ["PLUGIN_NAME"]:
              raise SystemExit(f"unexpected plugin: {payload.get('plugin')!r}")
          if payload.get("effective_mode") != "shadow":
              raise SystemExit(f"unexpected effective_mode: {payload.get('effective_mode')!r}")
          if payload.get("would_trade_if_enabled") is not False:
              raise SystemExit("TACO rebound shadow must remain notification-only")
          controls = payload.get("execution_controls") or {}
          if controls.get("broker_order_allowed") or controls.get("live_allocation_mutation_allowed"):
              raise SystemExit("TACO rebound shadow artifact must not allow broker/allocation mutation")
          print(
              "validated latest_signal "
              f"as_of={payload.get('as_of')} route={payload.get('canonical_route')} "
              f"action={payload.get('suggested_action')}"
          )
          PY

      - name: Publish or print GCS plan
        run: |
          set -euo pipefail
          if [ -z "${GCS_PREFIX:-}" ]; then
            echo "GCS_PREFIX is not set; skipping GCS publish."
            exit 0
          fi

          normalized_prefix="${GCS_PREFIX%/}"
          while IFS= read -r -d '' source_path; do
            relative_path="${source_path#${PLUGIN_OUTPUT_DIR}/}"
            destination="${normalized_prefix}/${relative_path}"
            if [ "${EXECUTE_PUBLISH}" = "true" ]; then
              gcloud storage cp "${source_path}" "${destination}"
            else
              echo "DRY-RUN gcloud storage cp ${source_path} ${destination}"
            fi
          done < <(find "${PLUGIN_OUTPUT_DIR}" -type f -print0 | sort -z)

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v7
        with:
          name: strategy-plugin-taco-rebound-shadow-${{ github.run_id }}
          path: |
            ${{ env.PRICE_INPUT_DIR }}
            ${{ env.PLUGIN_OUTPUT_DIR }}
            ${{ env.RUNNER_OUTPUT_DIR }}
          if-no-files-found: error
          retention-days: 7

      - name: Append job summary
        run: |
          set -euo pipefail
          {
            echo "## Strategy plugin publish"
            echo
            echo "- strategy: \`${STRATEGY_PROFILE}\`"
            echo "- plugin: \`${PLUGIN_NAME}\`"
            echo "- mode: \`shadow\`"
            echo "- event_set: \`${PLUGIN_EVENT_SET}\`"
            echo "- plugin_output_dir: \`${PLUGIN_OUTPUT_DIR}\`"
            echo "- gcs_prefix: \`${GCS_PREFIX:-<not set>}\`"
            echo "- execute_publish: \`${EXECUTE_PUBLISH}\`"
            echo
            echo "Generated plugin files:"
            find "${PLUGIN_OUTPUT_DIR}" -type f -print | sort | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"
