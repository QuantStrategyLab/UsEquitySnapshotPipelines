name: Snapshot Artifact Health

on:
  schedule:
    # Daily early-US-session check; catches stale latest manifests before regular execution windows.
    - cron: '30 13 * * 1-5'
  workflow_dispatch:
    inputs:
      profile:
        description: Snapshot profile to check
        required: true
        default: russell_top50_leader_rotation
        type: choice
        options:
          - russell_top50_leader_rotation
      max_month_lag:
        description: Maximum allowed month lag between snapshot_as_of and run date.
        required: false
        default: '1'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ fromJSON(github.event_name == 'schedule' && '["russell_top50_leader_rotation"]' || format('["{0}"]', inputs.profile || 'russell_top50_leader_rotation')) }}
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'interactivebrokersquant' }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT: ${{ vars.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}
      PROFILE: ${{ matrix.profile }}
      MAX_MONTH_LAG: ${{ inputs.max_month_lag || '1' }}
      SCHEDULED_RUSSELL_TOP50_LEADER_ROTATION_GCS_PREFIX: ${{ vars.SCHEDULED_RUSSELL_TOP50_LEADER_ROTATION_GCS_PREFIX || 'gs://qsl-runtime-logs-shared/strategy-artifacts/us_equity/russell_top50_leader_rotation_staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: '>= 416.0.0'

      - name: Resolve manifest path
        run: |
          set -euo pipefail
          case "${PROFILE}" in
            russell_top50_leader_rotation)
              prefix="${SCHEDULED_RUSSELL_TOP50_LEADER_ROTATION_GCS_PREFIX}"
              manifest_name="russell_top50_leader_rotation_feature_snapshot_latest.csv.manifest.json"
              ;;
            *)
              echo "Unsupported profile: ${PROFILE}" >&2
              exit 1
              ;;
          esac
          echo "SNAPSHOT_MANIFEST=${prefix%/}/${manifest_name}" >> "$GITHUB_ENV"

      - name: Check manifest freshness
        run: |
          set -euo pipefail
          python scripts/check_snapshot_artifact_health.py \
            --manifest "${SNAPSHOT_MANIFEST}" \
            --max-month-lag "${MAX_MONTH_LAG}"
