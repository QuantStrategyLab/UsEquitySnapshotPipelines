name: Monthly Snapshot Review

"on":
  workflow_run:
    workflows: ["Publish Snapshot Artifacts"]
    types: [completed]
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Optional Publish Snapshot Artifacts run id to review"
        required: false
        default: ""
      report_month:
        description: "Optional report month in YYYY-MM format"
        required: false
        default: ""

jobs:
  monthly-review:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write

    env:
      REVIEW_LABEL: monthly-review
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SELFHOSTED_CODEX_REVIEW_ENABLED: ${{ vars.SELFHOSTED_CODEX_REVIEW_ENABLED || 'true' }}
      SELFHOSTED_CODEX_REVIEW_REPOSITORY: ${{ vars.SELFHOSTED_CODEX_REVIEW_REPOSITORY || 'QuantStrategyLab/CryptoCodexAuditBridge' }}
      SELFHOSTED_CODEX_REVIEW_MODE: ${{ vars.SELFHOSTED_CODEX_REVIEW_MODE || 'review_and_fix' }}
      SELFHOSTED_CODEX_REVIEW_PROVIDER: ${{ vars.SELFHOSTED_CODEX_REVIEW_PROVIDER || 'auto' }}
      SELFHOSTED_CODEX_REVIEW_AUTO_MERGE: ${{ vars.SELFHOSTED_CODEX_REVIEW_AUTO_MERGE || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve source run
        id: source
        run: |
          set -euo pipefail
          run_id="${{ inputs.source_run_id || github.event.workflow_run.id || '' }}"
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"
          if [ -n "${run_id}" ]; then
            echo "Reviewing artifacts from run ${run_id}."
          else
            echo "No source run id supplied; review bundle will inspect local data/output only."
          fi

      - name: Download source artifacts
        if: steps.source.outputs.run_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data/output/monthly_review_inputs
          gh run download "${{ steps.source.outputs.run_id }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir data/output/monthly_review_inputs

      - name: Build monthly review bundle
        id: bundle
        run: |
          set -euo pipefail
          artifact_root="data/output/monthly_review_inputs"
          if [ ! -d "${artifact_root}" ]; then
            artifact_root="data/output"
          fi
          python scripts/run_monthly_report_bundle.py \
            --artifact-root "${artifact_root}" \
            --output-dir data/output/monthly_report_bundle \
            --report-month "${{ inputs.report_month || '' }}" >> "$GITHUB_OUTPUT"

      - name: Append bundle summary
        run: cat data/output/monthly_report_bundle/job_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create monthly review issue
        id: review_issue
        run: |
          set -euo pipefail
          title="Monthly Snapshot AI Review: ${{ steps.bundle.outputs.report_month }}"
          python scripts/post_monthly_ai_review_issue.py \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${title}" \
            --label "${REVIEW_LABEL}" \
            --body-file data/output/monthly_report_bundle/ai_review_input.md >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect Self-hosted Review GitHub App Credentials
        id: codex_review_app_credentials
        if: success() && env.SELFHOSTED_CODEX_REVIEW_ENABLED != 'false'
        env:
          APP_ID: ${{ vars.CROSS_REPO_GITHUB_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.CROSS_REPO_GITHUB_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${APP_ID:-}" ] && [ -n "${APP_PRIVATE_KEY:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App Token For Self-hosted Review
        id: codex_review_app_token
        if: steps.codex_review_app_credentials.outputs.available == 'true'
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CROSS_REPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.CROSS_REPO_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            CryptoCodexAuditBridge
          permission-actions: write

      - name: Trigger Monthly Review Automation
        env:
          APP_TOKEN: ${{ steps.codex_review_app_token.outputs.token }}
          CODEX_AUDIT_DISPATCH_TOKEN: ${{ secrets.CODEX_AUDIT_DISPATCH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          ISSUE_NUMBER: ${{ steps.review_issue.outputs.issue_number }}
          TARGET_REPOSITORY: ${{ env.SELFHOSTED_CODEX_REVIEW_REPOSITORY }}
          REVIEW_MODE: ${{ env.SELFHOSTED_CODEX_REVIEW_MODE }}
          REVIEW_PROVIDER: ${{ env.SELFHOSTED_CODEX_REVIEW_PROVIDER }}
          AUTO_MERGE: ${{ env.SELFHOSTED_CODEX_REVIEW_AUTO_MERGE }}
          CODEX_REVIEW_ENABLED: ${{ env.SELFHOSTED_CODEX_REVIEW_ENABLED }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.request

          def enabled(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() == "true"

          def dispatch(token: str, url: str, payload: dict) -> int:
              request = urllib.request.Request(
                  url,
                  data=json.dumps(payload).encode("utf-8"),
                  method="POST",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "Content-Type": "application/json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "us-equity-snapshot-monthly-review",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return response.status

          def dispatch_codex() -> None:
              token = os.environ.get("APP_TOKEN", "").strip() or os.environ.get("CODEX_AUDIT_DISPATCH_TOKEN", "").strip()
              if not token:
                  raise RuntimeError(
                      "Codex review workflow dispatch requires either a GitHub App token or CODEX_AUDIT_DISPATCH_TOKEN"
                  )
              target_repository = os.environ["TARGET_REPOSITORY"].strip()
              if not re.fullmatch(r"[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+", target_repository):
                  raise RuntimeError(f"Invalid Codex review repository: {target_repository!r}")
              mode = os.environ["REVIEW_MODE"].strip() or "review_and_fix"
              if mode not in {"review_only", "review_and_fix"}:
                  raise RuntimeError(f"Unsupported Codex review mode: {mode}")
              provider = os.environ["REVIEW_PROVIDER"].strip() or "codex"
              if provider not in {"api", "anthropic", "codex", "openai", "auto"}:
                  raise RuntimeError(f"Unsupported Codex review provider: {provider}")
              payload = {
                  "ref": "main",
                  "inputs": {
                      "source_repo": os.environ["GITHUB_REPOSITORY"],
                      "source_ref": os.environ["GITHUB_REF_NAME"],
                      "issue_number": os.environ["ISSUE_NUMBER"],
                      "mode": mode,
                      "provider": provider,
                      "auto_merge": str(os.environ["AUTO_MERGE"].strip().lower() == "true").lower(),
                  },
              }
              status = dispatch(
                  token,
                  f"https://api.github.com/repos/{target_repository}/actions/workflows/selfhosted_monthly_review.yml/dispatches",
                  payload,
              )
              if status not in (201, 204):
                  raise RuntimeError(f"Unexpected Codex dispatch status: {status}")
              print(
                  f"Dispatched CryptoCodexAuditBridge review for issue #{os.environ['ISSUE_NUMBER']} "
                  f"to {target_repository}"
              )

          if enabled("CODEX_REVIEW_ENABLED"):
              dispatch_codex()
              raise SystemExit(0)

          raise RuntimeError("Monthly review bridge dispatch is disabled by SELFHOSTED_CODEX_REVIEW_ENABLED=false")
          PY

      - name: Upload monthly review bundle
        uses: actions/upload-artifact@v7
        with:
          name: monthly-snapshot-review-${{ steps.bundle.outputs.report_month }}
          path: data/output/monthly_report_bundle/
