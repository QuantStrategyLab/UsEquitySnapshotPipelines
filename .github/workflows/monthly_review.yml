name: Monthly Snapshot Review

"on":
  workflow_run:
    workflows: ["Publish Snapshot Artifacts"]
    types: [completed]
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Optional Publish Snapshot Artifacts run id to review"
        required: false
        default: ""
      report_month:
        description: "Optional report month in YYYY-MM format"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  monthly-review:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'workflow_run')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: monthly-snapshot-review-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      actions: write
      contents: read
      issues: write

    env:
      REVIEW_LABEL: monthly-review
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      CODEX_AUDIT_ENABLED: ${{ vars.CODEX_AUDIT_ENABLED || 'true' }}
      CODEX_AUDIT_BRIDGE_REPOSITORY: ${{ vars.CODEX_AUDIT_BRIDGE_REPOSITORY || 'QuantStrategyLab/CodexAuditBridge' }}
      CODEX_AUDIT_BRIDGE_REF: ${{ vars.CODEX_AUDIT_BRIDGE_REF || 'main' }}
      CODEX_AUDIT_MODE: ${{ vars.CODEX_AUDIT_MODE || 'review_and_fix' }}
      CODEX_AUDIT_PROVIDER: ${{ vars.CODEX_AUDIT_PROVIDER || 'auto' }}
      CODEX_AUDIT_AUTO_MERGE: ${{ vars.CODEX_AUDIT_AUTO_MERGE || 'false' }}
      CODEX_AUDIT_REQUIRED_STATUS_CHECKS: ${{ vars.CODEX_AUDIT_REQUIRED_STATUS_CHECKS || 'test' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install monthly review dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install "pandas>=2.0"

      - name: Resolve source run
        id: source
        run: |
          set -euo pipefail
          run_id="${{ inputs.source_run_id || github.event.workflow_run.id || '' }}"
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"
          if [ -n "${run_id}" ]; then
            echo "Reviewing artifacts from run ${run_id}."
          else
            echo "No source run id supplied; review bundle will inspect local data/output only."
          fi

      - name: Download source artifacts
        if: steps.source.outputs.run_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data/output/monthly_review_inputs
          gh run download "${{ steps.source.outputs.run_id }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir data/output/monthly_review_inputs

      - name: Build live strategy health reports
        run: |
          set -euo pipefail
          artifact_root="data/output/monthly_review_inputs"
          if [ ! -d "${artifact_root}" ]; then
            artifact_root="data/output"
          fi
          python scripts/build_monthly_live_strategy_health_reports.py \
            --artifact-root "${artifact_root}" \
            --output-root "${artifact_root}"

      - name: Build monthly review bundle
        id: bundle
        run: |
          set -euo pipefail
          artifact_root="data/output/monthly_review_inputs"
          if [ ! -d "${artifact_root}" ]; then
            artifact_root="data/output"
          fi
          python scripts/run_monthly_report_bundle.py \
            --artifact-root "${artifact_root}" \
            --output-dir data/output/monthly_report_bundle \
            --report-month "${{ inputs.report_month || '' }}" >> "$GITHUB_OUTPUT"

      - name: Append bundle summary
        run: cat data/output/monthly_report_bundle/job_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create monthly review issue
        id: review_issue
        run: |
          set -euo pipefail
          title="Monthly Snapshot AI Review: ${{ steps.bundle.outputs.report_month }}"
          python scripts/post_monthly_ai_review_issue.py \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${title}" \
            --label "${REVIEW_LABEL}" \
            --body-file data/output/monthly_report_bundle/ai_review_input.md >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure guarded auto-merge labels
        if: success() && contains(fromJSON('["true","True","TRUE"]'), env.CODEX_AUDIT_ENABLED) && contains(fromJSON('["true","True","TRUE"]'), env.CODEX_AUDIT_AUTO_MERGE)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python scripts/sync_codex_auto_merge_labels.py \
            --repo "${GITHUB_REPOSITORY}" \
            --auto-merge "${CODEX_AUDIT_AUTO_MERGE}" \
            --summary-file data/output/monthly_report_bundle/codex_auto_merge_label_sync.md

      - name: Check guarded auto-merge readiness
        id: auto_merge_readiness
        if: success() && contains(fromJSON('["true","True","TRUE"]'), env.CODEX_AUDIT_ENABLED)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.CODEX_AUDIT_READINESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python scripts/check_codex_auto_merge_readiness.py \
            --repo "${GITHUB_REPOSITORY}" \
            --branch "${GITHUB_REF_NAME}" \
            --auto-merge "${CODEX_AUDIT_AUTO_MERGE}" \
            --required-status-checks "${CODEX_AUDIT_REQUIRED_STATUS_CHECKS}" \
            --summary-file data/output/monthly_report_bundle/codex_auto_merge_readiness.md

      - name: Build guarded auto-merge enablement plan
        if: success() && contains(fromJSON('["true","True","TRUE"]'), env.CODEX_AUDIT_ENABLED)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.CODEX_AUDIT_READINESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python scripts/plan_codex_auto_merge_enablement.py \
            --repo "${GITHUB_REPOSITORY}" \
            --branch "${GITHUB_REF_NAME}" \
            --required-status-checks "${CODEX_AUDIT_REQUIRED_STATUS_CHECKS}" \
            --output-file data/output/monthly_report_bundle/codex_auto_merge_enablement_plan.md

      - name: Comment guarded auto-merge preflight summary
        if: success() && contains(fromJSON('["true","True","TRUE"]'), env.CODEX_AUDIT_ENABLED)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python scripts/post_codex_auto_merge_preflight_comment.py \
            --repo "${GITHUB_REPOSITORY}" \
            --issue-number "${{ steps.review_issue.outputs.issue_number }}" \
            --report-month "${{ steps.bundle.outputs.report_month }}" \
            --readiness-file data/output/monthly_report_bundle/codex_auto_merge_readiness.md \
            --label-sync-file data/output/monthly_report_bundle/codex_auto_merge_label_sync.md \
            --enablement-plan-file data/output/monthly_report_bundle/codex_auto_merge_enablement_plan.md \
            --output-file data/output/monthly_report_bundle/codex_auto_merge_preflight_comment.md

      - name: Detect Codex Audit GitHub App Credentials
        id: codex_review_app_credentials
        if: success() && contains(fromJSON('["true","True","TRUE"]'), env.CODEX_AUDIT_ENABLED)
        env:
          APP_ID: ${{ vars.CROSS_REPO_GITHUB_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.CROSS_REPO_GITHUB_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${APP_ID:-}" ] && [ -n "${APP_PRIVATE_KEY:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App Token For Codex Audit
        id: codex_review_app_token
        if: steps.codex_review_app_credentials.outputs.available == 'true'
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CROSS_REPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.CROSS_REPO_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            CodexAuditBridge
          permission-actions: write

      - name: Trigger Monthly Review Automation
        if: success() && contains(fromJSON('["true","True","TRUE"]'), env.CODEX_AUDIT_ENABLED)
        env:
          APP_TOKEN: ${{ steps.codex_review_app_token.outputs.token }}
          CODEX_AUDIT_DISPATCH_TOKEN: ${{ secrets.CODEX_AUDIT_DISPATCH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          ISSUE_NUMBER: ${{ steps.review_issue.outputs.issue_number }}
          TARGET_REPOSITORY: ${{ env.CODEX_AUDIT_BRIDGE_REPOSITORY }}
          REVIEW_MODE: ${{ env.CODEX_AUDIT_MODE }}
          REVIEW_PROVIDER: ${{ env.CODEX_AUDIT_PROVIDER }}
          AUTO_MERGE_REQUESTED: ${{ env.CODEX_AUDIT_AUTO_MERGE }}
          AUTO_MERGE_READINESS_OUTCOME: ${{ steps.auto_merge_readiness.outcome || 'skipped' }}
          CODEX_AUDIT_ENABLED_RUNTIME: ${{ env.CODEX_AUDIT_ENABLED }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.request

          def enabled(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() == "true"

          def dispatch(token: str, url: str, payload: dict) -> int:
              request = urllib.request.Request(
                  url,
                  data=json.dumps(payload).encode("utf-8"),
                  method="POST",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "Content-Type": "application/json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "us-equity-snapshot-monthly-review",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return response.status

          def dispatch_codex() -> None:
              token = os.environ.get("APP_TOKEN", "").strip() or os.environ.get("CODEX_AUDIT_DISPATCH_TOKEN", "").strip()
              if not token:
                  raise RuntimeError(
                      "Codex audit workflow dispatch requires either a GitHub App token or CODEX_AUDIT_DISPATCH_TOKEN"
                  )
              target_repository = os.environ["TARGET_REPOSITORY"].strip()
              if not re.fullmatch(r"[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+", target_repository):
                  raise RuntimeError(f"Invalid Codex audit repository: {target_repository!r}")
              mode = os.environ["REVIEW_MODE"].strip() or "review_and_fix"
              if mode not in {"review_only", "review_and_fix"}:
                  raise RuntimeError(f"Unsupported Codex audit mode: {mode}")
              provider = os.environ["REVIEW_PROVIDER"].strip() or "codex"
              if provider not in {"api", "anthropic", "codex", "openai", "auto"}:
                  raise RuntimeError(f"Unsupported Codex audit provider: {provider}")
              auto_merge_requested = enabled("AUTO_MERGE_REQUESTED")
              auto_merge_ready = os.environ.get("AUTO_MERGE_READINESS_OUTCOME", "").strip() == "success"
              auto_merge = auto_merge_requested and auto_merge_ready
              if auto_merge_requested and not auto_merge_ready:
                  print(
                      "Guarded auto-merge was requested, but readiness did not pass; "
                      "dispatching Codex audit with auto_merge=false."
                  )
              payload = {
                  "ref": os.environ["CODEX_AUDIT_BRIDGE_REF"],
                  "inputs": {
                      "source_repo": os.environ["GITHUB_REPOSITORY"],
                      "source_ref": os.environ["GITHUB_REF_NAME"],
                      "issue_number": os.environ["ISSUE_NUMBER"],
                      "mode": mode,
                      "provider": provider,
                      "auto_merge": str(auto_merge).lower(),
                      "task": "monthly_snapshot_audit",
                  },
              }
              status = dispatch(
                  token,
                  f"https://api.github.com/repos/{target_repository}/actions/workflows/codex_audit.yml/dispatches",
                  payload,
              )
              if status not in (201, 204):
                  raise RuntimeError(f"Unexpected Codex dispatch status: {status}")
              print(
                  f"Dispatched CodexAuditBridge review for issue #{os.environ['ISSUE_NUMBER']} "
                  f"to {target_repository}"
              )

          if enabled("CODEX_AUDIT_ENABLED_RUNTIME"):
              dispatch_codex()
              raise SystemExit(0)

          print("Codex audit bridge dispatch is disabled by CODEX_AUDIT_ENABLED=false")
          PY

      - name: Upload monthly review bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: monthly-snapshot-review-${{ steps.bundle.outputs.report_month || 'unknown' }}
          path: data/output/monthly_report_bundle/
          if-no-files-found: warn
