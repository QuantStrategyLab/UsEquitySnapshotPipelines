name: AI Monthly Review

"on":
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to review"
        required: true

jobs:
  ai-review:
    if: contains(github.event.issue.labels.*.name, 'monthly-review') || inputs.issue_number != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load review issue context
        id: issue_context
        run: |
          mkdir -p data/output/ai_review
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          issue_number = os.environ["ISSUE_NUMBER"]
          token = os.environ["GITHUB_TOKEN"]
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{issue_number}",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "us-equity-ai-review",
              },
          )
          with urllib.request.urlopen(request) as response:
              issue = json.load(response)

          Path("data/output/ai_review/issue_context.json").write_text(
              json.dumps(
                  {"number": issue["number"], "title": issue["title"], "body": issue.get("body", "")},
                  ensure_ascii=False,
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print("issue_title<<EOF", file=output)
              print(issue["title"], file=output)
              print("EOF", file=output)
              print("issue_body<<EOF", file=output)
              print(issue.get("body", ""), file=output)
              print("EOF", file=output)
          PY
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.issue_number || github.event.issue.number }}

      - name: Run Claude Code Review
        id: claude_review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_bedrock: false
          use_vertex: false
          prompt: |
            Do not use Bash or ask for additional approval.
            Return only the final bilingual review in markdown.
            The workflow will publish your final review as the issue comment.

            You are reviewing the monthly snapshot artifact report for UsEquitySnapshotPipelines.
            This repository is an upstream producer for snapshot-backed US equity strategies.
            It does not place trades and does not own broker execution.

            ## Issue Title
            ${{ steps.issue_context.outputs.issue_title }}

            ## Issue Body
            ${{ steps.issue_context.outputs.issue_body }}

            ## Review Scope

            1. Artifact completeness for each expected monthly snapshot profile.
            2. Snapshot contract health: profile name, contract version, row count, snapshot date, and ranking preview.
            3. Missing or stale evidence that should block downstream confidence.
            4. Downstream impact for broker/runtime repositories that consume the published artifact contract.
            5. Low-risk operator follow-ups. Do not recommend production strategy changes from one monthly artifact alone.

            ## Output Format

            Structure your response as:

            ---
            ## English

            ### Artifact Completeness
            ...
            ### Contract Health
            ...
            ### Evidence Gaps
            ...
            ### Downstream Impact
            ...
            ### Operator Action Items
            ...

            ---
            ## Chinese

            ### 产物完整性
            ...
            ### 合约健康度
            ...
            ### 证据缺口
            ...
            ### 下游影响
            ...
            ### 操作员待办事项
            ...

      - name: Render AI review markdown
        run: |
          python3 scripts/render_monthly_ai_review.py \
            --execution-file "${{ steps.claude_review.outputs.execution_file }}" \
            --output-file data/output/ai_review/final_review.md \
            --primary-title "Claude Primary Review"

      - name: Upload AI review artifact
        uses: actions/upload-artifact@v7
        with:
          name: ai-monthly-review-${{ inputs.issue_number || github.event.issue.number }}
          path: data/output/ai_review/

      - name: Post AI review issue comment
        run: |
          python3 scripts/post_monthly_ai_review_comment.py \
            --repo "${GITHUB_REPOSITORY}" \
            --issue-number "${{ inputs.issue_number || github.event.issue.number }}" \
            --review-file data/output/ai_review/final_review.md \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
