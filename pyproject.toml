[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "us-equity-snapshot-pipelines"
version = "0.1.0"
description = "Upstream feature-snapshot and release pipelines for US equity strategies"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "pandas>=2.0",
  "yfinance>=0.2.40",
  "us-equity-strategies @ git+https://github.com/QuantStrategyLab/UsEquityStrategies.git@v0.7.24",
]

[project.optional-dependencies]
test = ["pytest>=8"]

[project.scripts]
useq-build-tech-communication-pullback-snapshot = "us_equity_snapshot_pipelines.tech_communication_pullback:main"
useq-build-russell-1000-snapshot = "us_equity_snapshot_pipelines.russell_1000_multi_factor_defensive:main"
useq-build-mega-cap-leader-rotation-dynamic-top20-snapshot = "us_equity_snapshot_pipelines.mega_cap_leader_rotation_dynamic_top20:main"
useq-build-dynamic-mega-leveraged-pullback-snapshot = "us_equity_snapshot_pipelines.dynamic_mega_leveraged_pullback:main"
useq-backtest-mega-cap-leader-rotation = "us_equity_snapshot_pipelines.mega_cap_leader_rotation_backtest:main"
useq-backtest-mega-cap-leader-rotation-robustness = "us_equity_snapshot_pipelines.mega_cap_leader_rotation_robustness:main"
useq-backtest-mag7-leveraged-pullback = "us_equity_snapshot_pipelines.mag7_leveraged_pullback_backtest:main"
useq-backtest-dynamic-mega-leveraged-pullback = "us_equity_snapshot_pipelines.mag7_leveraged_pullback_backtest:main"
useq-publish-snapshot-artifacts = "us_equity_snapshot_pipelines.publish:main"
useq-update-russell-1000-input-data = "us_equity_snapshot_pipelines.russell_1000_inputs:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py311"
line-length = 120
